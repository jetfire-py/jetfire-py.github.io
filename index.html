<!DOCTYPE html>
<html>
<head>
<title>Mech Tower</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background:black;
}
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 18px;
  color: white;
}
canvas { display: block; }
</style>
</head>
<body>

<div id="ui">
Level: <span id="level">1</span> |
Money: $<span id="money">0</span> |
Base HP: <span id="basehp">1000</span>
<br>
Arrow Keys = Move | Mouse = Aim | Click = Shoot | H = Hangar | F = Fullscreen
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

function toggleFullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}
}

let level = 1;
let money = 0;
let enemies = [];
let bullets = [];
let particles = [];
let rocks = [];
let inHangar = false;
let gameOver = false;

const base = {hp:1000};

const player = {
x: canvas.width*0.1,
y: canvas.height/2,
size: 50,
speed: 5,
gunDamage: 10,
fireRate: 250,
lastShot: 0
};

const keys = {};
let mouseX = 0;
let mouseY = 0;

function generateRocks(){
rocks=[];
for(let i=0;i<50;i++){
rocks.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:10+Math.random()*20
});
}
}
generateRocks();

function spawnEnemy(){
let hp = 1; 
let speed = 1 + level*0.15;
let size = 40;

if(level % 5 === 0){
speed *= 0.7;
size = 70;
}

enemies.push({
x:canvas.width+50,
y:Math.random()*canvas.height,
hp,
speed,
size,
frame:0
});
}

setInterval(spawnEnemy,2000);

window.addEventListener("keydown",e=>{
keys[e.key]=true;

if(e.key==="h"||e.key==="H") inHangar=!inHangar;
if(e.key==="f"||e.key==="F") toggleFullscreen();
});

window.addEventListener("keyup",e=>keys[e.key]=false);

canvas.addEventListener("mousemove",e=>{
const rect=canvas.getBoundingClientRect();
mouseX=e.clientX-rect.left;
mouseY=e.clientY-rect.top;
});

canvas.addEventListener("mousedown",shoot);

function shoot(){
if(inHangar || gameOver) return;

let now=Date.now();
if(now-player.lastShot<player.fireRate) return;

player.lastShot=now;

let angle=Math.atan2(mouseY-player.y,mouseX-player.x);

bullets.push({
x:player.x,
y:player.y,
vx:Math.cos(angle)*10,
vy:Math.sin(angle)*10,
damage:player.gunDamage
});
}

function explosion(x,y){
for(let i=0;i<15;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:30+Math.random()*20
});
}
}

function update(){

if(gameOver) return;

if(!inHangar){

if(keys["ArrowUp"]) player.y-=player.speed;
if(keys["ArrowDown"]) player.y+=player.speed;
if(keys["ArrowLeft"]) player.x-=player.speed;
if(keys["ArrowRight"]) player.x+=player.speed;

player.x=Math.max(0,Math.min(canvas.width-player.size,player.x));
player.y=Math.max(0,Math.min(canvas.height-player.size,player.y));

bullets.forEach(b=>{
b.x+=b.vx;
b.y+=b.vy;
});

bullets=bullets.filter(b =>
b.x>0 && b.x<canvas.width &&
b.y>0 && b.y<canvas.height
);

enemies.forEach(e=>{
let angle=Math.atan2(player.y-e.y,player.x-e.x);

e.x+=Math.cos(angle)*e.speed;
e.y+=Math.sin(angle)*e.speed;

e.frame+=0.1;

if(e.x<140){
base.hp-=0.5;
}
});

bullets.forEach(b=>{
enemies.forEach(e=>{
if(Math.abs(b.x-e.x)<e.size/2 && Math.abs(b.y-e.y)<e.size/2){

e.hp-=b.damage;
b.x=-9999;

if(e.hp<=0){
money+=20;
explosion(e.x,e.y);
}

}
});
});

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;
});

particles=particles.filter(p=>p.life>0);
enemies=enemies.filter(e=>e.hp>0);

if(money>level*150) level++;
}

base.hp=Math.max(0,base.hp);

if(base.hp<=0){
gameOver=true;
}

document.getElementById("level").innerText=level;
document.getElementById("money").innerText=money;
document.getElementById("basehp").innerText=Math.floor(base.hp);
}

function drawMech(){

let cx=player.x;
let cy=player.y;

ctx.save();
ctx.translate(cx,cy);

let angle=Math.atan2(mouseY-cy,mouseX-cx);
ctx.rotate(angle);

ctx.fillStyle="#2a6cff";
ctx.fillRect(-player.size/2,-player.size/3,player.size,player.size*0.7);

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(0,-player.size*0.25,player.size*0.2,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="gray";
ctx.fillRect(0,-6,player.size*0.6,12);

ctx.restore();

ctx.fillStyle="#444";
ctx.fillRect(cx-15,cy+player.size/2,12,20);
ctx.fillRect(cx+3,cy+player.size/2,12,20);
}

function drawEnemy(e){

let cx=e.x;
let cy=e.y;

ctx.save();
ctx.translate(cx,cy);

let bob=Math.sin(e.frame)*5;

ctx.fillStyle=(level%5===0)?"#7a00ff":"#cc2222";
ctx.fillRect(-e.size/2,-e.size/2+bob,e.size,e.size);

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(0,-e.size*0.15+bob,e.size*0.2,0,Math.PI*2);
ctx.fill();

ctx.restore();
}

function drawWall(){

const wallX=100;
const panelHeight=50;
const numPanels=Math.floor(canvas.height/panelHeight)+2;

for(let i=0;i<numPanels;i++){

const y=i*panelHeight;

ctx.fillStyle="#006600";
ctx.fillRect(wallX-10,y,20,panelHeight-2);

ctx.strokeStyle="#00ff88";
ctx.lineWidth=2;
ctx.strokeRect(wallX-10,y,20,panelHeight-2);

}
}

function drawRocks(){

rocks.forEach(r=>{
ctx.fillStyle="#804000";
ctx.beginPath();
ctx.arc(r.x,r.y,r.size/2,0,Math.PI*2);
ctx.fill();
});

}

function draw(){

if(gameOver){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="red";
ctx.font="80px Arial";
ctx.fillText("GAME OVER",canvas.width/2-220,canvas.height/2);

ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("Final Level: "+level,canvas.width/2-100,canvas.height/2+60);
ctx.fillText("Refresh page to restart",canvas.width/2-160,canvas.height/2+110);

return;
}

const wallX=100;

ctx.fillStyle="#888";
ctx.fillRect(0,0,wallX,canvas.height);

let grd=ctx.createLinearGradient(wallX,0,canvas.width,0);
grd.addColorStop(0,"#ffb86c");
grd.addColorStop(1,"#ff8c00");

ctx.fillStyle=grd;
ctx.fillRect(wallX,0,canvas.width-wallX,canvas.height);

drawRocks();
drawWall();

if(inHangar){

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("HANGAR",canvas.width/2-80,120);

ctx.font="22px Arial";
ctx.fillText("1 - Upgrade Gun (+5 damage) $150",canvas.width/2-150,250);
ctx.fillText("2 - Faster Fire Rate $200",canvas.width/2-150,300);
ctx.fillText("3 - Bigger Mech $400",canvas.width/2-150,350);

ctx.fillText("Press H to exit",canvas.width/2-80,450);

return;
}

drawMech();

ctx.strokeStyle="white";
ctx.beginPath();
ctx.moveTo(player.x,player.y);
ctx.lineTo(mouseX,mouseY);
ctx.stroke();

bullets.forEach(b=>{
ctx.fillStyle="yellow";
ctx.fillRect(b.x,b.y,5,5);
});

enemies.forEach(drawEnemy);

particles.forEach(p=>{
ctx.fillStyle="orange";
ctx.fillRect(p.x,p.y,3,3);
});

}

function gameLoop(){
update();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener("keydown",e=>{

if(!inHangar) return;

if(e.key==="1" && money>=150){
money-=150;
player.gunDamage+=5;
}

if(e.key==="2" && money>=200){
money-=200;
player.fireRate=Math.max(60,player.fireRate-30);
}

if(e.key==="3" && money>=400){
money-=400;
player.size+=8;
}

});

</script>
</body>
</html>
