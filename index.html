<!DOCTYPE html>

<html>
<head>
<title>Last Mech</title>
<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

canvas{
background:#111;
display:block;
} </style>

</head>

<body>

<div id="ui">
Level: <span id="level">1</span> |
Money: $<span id="money">0</span> |
Base HP: <span id="basehp">1000</span>
<br>
Arrow Keys = Move | Mouse = Aim | Click = Shoot | H = Hangar
</div>

<canvas id="game" width="1000" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let level = 1;
let money = 0;
let enemies = [];
let bullets = [];
let particles = [];
let inHangar = false;

const keys = {};
let mouseX = 0;
let mouseY = 0;

const base = {
hp:1000
};

const player = {
x:150,
y:300,
size:35,
speed:4,
gunDamage:10,
fireRate:250,
lastShot:0
};

function spawnEnemy(){

let hp = 40 + level*10;
let speed = 1 + level*0.15;
let size = 30;

if(level % 5 === 0){
hp *= 6;
speed *= 0.7;
size = 60;
}

enemies.push({
x:canvas.width+50,
y:Math.random()*canvas.height,
hp:hp,
speed:speed,
size:size
});

}

setInterval(spawnEnemy,2000);

window.addEventListener("keydown",e=>{
keys[e.key]=true;

if(e.key==="h" || e.key==="H"){
inHangar=!inHangar;
}
});

window.addEventListener("keyup",e=>{
keys[e.key]=false;
});

canvas.addEventListener("mousemove",e=>{
const rect=canvas.getBoundingClientRect();
mouseX=e.clientX-rect.left;
mouseY=e.clientY-rect.top;
});

canvas.addEventListener("mousedown",shoot);

function shoot(){

if(inHangar) return;

let now = Date.now();
if(now-player.lastShot < player.fireRate) return;

player.lastShot=now;

let angle=Math.atan2(mouseY-player.y,mouseX-player.x);

bullets.push({
x:player.x,
y:player.y,
vx:Math.cos(angle)*8,
vy:Math.sin(angle)*8,
damage:player.gunDamage
});

}

function explosion(x,y){

for(let i=0;i<10;i++){
particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:30
});
}

}

function update(){

if(inHangar) return;

if(keys["ArrowUp"]) player.y-=player.speed;
if(keys["ArrowDown"]) player.y+=player.speed;
if(keys["ArrowLeft"]) player.x-=player.speed;
if(keys["ArrowRight"]) player.x+=player.speed;

player.x=Math.max(0,Math.min(canvas.width-player.size,player.x));
player.y=Math.max(0,Math.min(canvas.height-player.size,player.y));

bullets.forEach(b=>{
b.x+=b.vx;
b.y+=b.vy;
});

enemies.forEach(e=>{

let angle=Math.atan2(player.y-e.y,player.x-e.x);

e.x+=Math.cos(angle)*e.speed;
e.y+=Math.sin(angle)*e.speed;

if(e.x<120){
base.hp-=0.3;
}

});

bullets.forEach(b=>{
enemies.forEach(e=>{
if(Math.abs(b.x-e.x)<e.size/2 && Math.abs(b.y-e.y)<e.size/2){

e.hp-=b.damage;
b.x=9999;

if(e.hp<=0){
money+=20;
explosion(e.x,e.y);
}

}
});
});

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;
});

particles=particles.filter(p=>p.life>0);

enemies=enemies.filter(e=>e.hp>0);

if(money>level*150){
level++;
}

document.getElementById("level").innerText=level;
document.getElementById("money").innerText=money;
document.getElementById("basehp").innerText=Math.floor(base.hp);

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(inHangar){

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("HANGAR",420,120);

ctx.font="22px Arial";

ctx.fillText("1 - Upgrade Gun (+5 damage) $150",350,250);
ctx.fillText("2 - Faster Fire Rate $200",350,300);
ctx.fillText("3 - Bigger Mech $400",350,350);

ctx.fillText("Press H to exit",410,450);

return;
}

ctx.fillStyle="green";
ctx.fillRect(100,0,20,canvas.height);

ctx.fillStyle="blue";
ctx.fillRect(player.x,player.y,player.size,player.size);

ctx.strokeStyle="white";
ctx.beginPath();
ctx.moveTo(player.x+player.size/2,player.y+player.size/2);
ctx.lineTo(mouseX,mouseY);
ctx.stroke();

bullets.forEach(b=>{
ctx.fillStyle="yellow";
ctx.fillRect(b.x,b.y,5,5);
});

enemies.forEach(e=>{
ctx.fillStyle=(level%5===0)?"purple":"red";
ctx.fillRect(e.x,e.y,e.size,e.size);
});

particles.forEach(p=>{
ctx.fillStyle="orange";
ctx.fillRect(p.x,p.y,3,3);
});

}

function gameLoop(){
update();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener("keydown",e=>{

if(!inHangar) return;

if(e.key==="1" && money>=150){
money-=150;
player.gunDamage+=5;
}

if(e.key==="2" && money>=200){
money-=200;
player.fireRate-=30;
}

if(e.key==="3" && money>=400){
money-=400;
player.size+=8;
}

});

</script>

</body>
</html>
